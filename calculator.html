<!DOCTYPE html>
<html lang="id">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="theme-color" content="#001f3f">
    <link rel="icon" href="favicon-2.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Harga</title>
</head>
<body class="bg-light">
    <header class="p-2 bg-primary">
        <a href="toko.html">
        <p class="text-white ms-2"><svg xmlns="http://www.w3.org/2000/svg" width="26" height=26" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
</svg> Kalkulator Harga</p>
</a>
    </header>  
    
    
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="col-md-4 col-10">
            <div class="card shadow-lg p-4">
                <h3 class="text-center mb-4">Kalkulator Harga</h3>

                <div class="mb-3">
                    <input type="number" id="hargaBarang" class="form-control" placeholder="Masukkan harga 1 : ">
                </div>
                <div class="mb-3">
                    <input type="number" id="hargaBarang2" class="form-control" placeholder="Masukkan harga 2 : ">
                </div>

                <div class="d-grid gap-2 mb-4">
                    <div class="row g-2">
                        <div class="col-6">
                            <button onclick="hitung('+')" class="btn btn-primary w-100">+ Tambah</button>
                        </div>

                        <div class="col-6">
                            <button onclick="hitung('-')" class="btn btn-primary w-100">- Kurang</button>
                        </div>

                        <div class="col-6">
                            <button onclick="hitung('*')" class="btn btn-primary w-100">x Kali</button>
                        </div>

                        <div class="col-6">
                            <button onclick="hitung('/')" class="btn btn-primary w-100">: Bagi</button>
                        </div>
                    </div>
                    <button onclick="reset()" class="btn btn-danger w-100">Hapus</button>
                </div>

                <div class="alert alert-info text-center fw-bold">
                 Total belanja Kamu : <span id="hasil">0</span>
                </div>
            </div>
        </div>
    </div>
    <script src="calculator.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
    Swal.fire({
    title: "Fitur Baru: Kalkulator Harga",
    text: "Hitung harga jadi lebih cepat dan akurat dengan Kalkulator Harga.",
    icon: "info"
});
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
